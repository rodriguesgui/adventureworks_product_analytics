version: 2

models:
  - name: int_product
    description: "Intermediate Table contending product's infos"
    columns:
      - name: product_name
        data_tests:
          - not_null
      - name: product_id
        data_tests:
          - not_null
          - unique
          - relationships:
              to: ref('stg_product')
              field: product_id
      - name: product_number
        data_tests:
          - not_null
          - unique
          - relationships:
              to: ref('stg_product')
              field: product_number
      - name: product_standard_cost
        data_tests:
          - not_null
      - name: product_list_price
        data_tests:
          - not_null
  - name: int_sales_order_with_cost
    description: "Intermediate Table contending orders's infos"
    columns:
      - name: product_id
        data_tests:
          - not_null
          - relationships:
              to: ref('stg_product')
              field: product_id
      - name: sales_order_detail_id
        data_tests:
          - not_null
          - unique
          - relationships:
              to: ref('stg_sales_order_detail')
              field: sales_order_detail_id
      - name: order_quantity
        data_tests:
          - not_null
      - name: unit_price
        data_tests:
          - not_null
      - name: special_offer_id
        data_tests:
          - not_null
          - relationships:
              to: ref('stg_sales_special_offer')
              field: special_offer_id
      - name: sales_order_id
        data_tests:
          - not_null
          - relationships:
              to: ref('stg_sales_order_detail')
              field: sales_order_id
    